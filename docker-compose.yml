services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: afi # change this to your desired username
      POSTGRES_PASSWORD: afi # change this to your desired password for the database
      POSTGRES_DB: afi # change this to your desired database name
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Optional brokers for platform domain events (enable events.outbox_enabled in config).
  # nats:
  #   image: nats:2.10-alpine
  #   command: ["-js", "-m", "8222"]
  #   ports:
  #     - "4222:4222"
  #     - "8222:8222"
  # kafka:
  #   image: bitnami/kafka:3.7
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     - KAFKA_CFG_NODE_ID=0
  #     - KAFKA_CFG_PROCESS_ROLES=controller,broker
  #     - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
  #     - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
  #     - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
  #     - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
  #     - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://127.0.0.1:9092

  adminer:
    image: adminer:latest
    ports:
      - "5050:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
