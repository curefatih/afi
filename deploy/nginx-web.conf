server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# SPA fallback for client-side routes.
	location / {
		try_files $uri $uri/ /index.html;
	}

	location = /healthz {
		access_log off;
		add_header Content-Type application/json;
		return 200 '{"status":"ok"}';
	}
}
