server:
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 0s

database:
  url: postgres://afi:afi@localhost:5433/afi?sslmode=disable
  migrations_dir: migrations
  auto_migrate: true
  
hooks:
  timeout_ms: 50
  hook_specs:
    - name: onRequest
      path: hooks/example.js

providers:
  openai:
    base_url: https://api.openai.com
    api_key: ${OPENAI_API_KEY}
  anthropic:
    base_url: https://api.anthropic.com
    api_key: ${ANTHROPIC_API_KEY}

