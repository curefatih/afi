# Setup Local Platform Context Matrix
organizations:
  - id: "org_local"
    name: "Development Corp"

teams:
  - id: "team_local"
    org_id: "org_local"
    name: "Engineering Team"
projects:
  - id: "proj_local"
    team_id: "team_local"
    name: "LLM Sandbox"

auth:
  token_secret: "super-secure-dev-platform-secret-key-change-in-prod"
  token_duration: 12h
  issuer: "afi-gateway-platform"

# Seed valid API Keys
api_keys:
  - raw_key_prefix: "sk-project-local-dev-token-12345" # Becomes sk-project-local-dev-token-12345...
    type: "SERVICE_ACCOUNT"
    project_id: "proj_local"

# Local Vault Provider Mapping
upstream_credentials:
  - project_id: "proj_local"
    provider: "openai"
    env_var_key: "LOCAL_OPENAI_API_KEY" # Reads from your local shell environment
  - project_id: "proj_local"
    provider: "anthropic"
    env_var_key: "LOCAL_ANTHROPIC_API_KEY"

# Hierarchical Budgets Checkpoints Setup
budgets:
  - scope: "PROJECT"
    target_id: "proj_local"
    max_cost: 50.00
    used_cost: 0.00

routing_rules:
  - id: "rule_1"
    name: "Catch-all Local Dev Rule"
    priority: 1
    is_active: true
    conditions: [] # Ensure this array is explicitly empty to match EVERYTHING
    target:
      provider: "openai"
      target_model: "gpt-4o"

# Dynamic JavaScript Hooks Intercept Binding Locations
hooks:
  timeout_ms: 50
  specs:
    - name: "onRequest"
      path: "configs/hooks/req_mask_cc.js"
    - name: "onResponse"
      path: "configs/hooks/res_inject_meta.js"

http:
  port: 8080
  read_timeout: 15s
  write_timeout: 0s

database:
  host: localhost
  port: 5433
  user: afi
  password: afi
  name: afi
  ssl_mode: disable
  connection_string: postgresql://afi:afi@localhost:5433/afi?sslmode=disable