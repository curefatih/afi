database_url: "postgres://afi:afi@localhost:5433/afi?sslmode=disable"
redis_url: "redis://localhost:6379/0"

controlplane:
  addr: ":8081"

gateway:
  addr: ":8080"
  snapshot_poll_interval: "2s"
  # Local TinyGo example (extensions/wasmhook). Paths are relative to process cwd (repo root).
  # before_call: deny when X-AFI-Tags includes plan:blocked; stamps metadata.wasm_hook.
  # before_chat: prefixes last user message with "[wasm] ".
  wasm_before_call: "extensions/wasmhook/hook.wasm"
  wasm_before_chat: "extensions/wasmhook/hook.wasm"

auth:
  jwt_secret: "afi-local-dev-jwt-secret-change-me"
  token_ttl: "24h"
  internal_token: "afi-local-internal-token"
  public_base_url: "http://localhost:8081"
  # Platform-wide SSO (OAuth2 / OIDC). Leave enabled:false until providers are configured.
  sso:
    enabled: false
    providers: []
    # Example:
    # providers:
    #   - id: google
    #     type: oidc
    #     display_name: Google
    #     issuer: https://accounts.google.com
    #     client_id: "..."
    #     client_secret: "..."
    #     scopes: ["openid", "email", "profile"]
    #     require_email_verified: true


# Required for Secrets → storage_kind=encrypted_db (controlplane + gateway).
# Any string is SHA-256-derived; or use base64:<32-byte-key>.
credentials:
  master_key: "afi-local-dev-credentials-master-key"

seed:
  virtual_api_key: "sk-project-local-dev-token-12345"
  admin_email: "admin@afi.local"
  admin_password: "admin"
  admin_name: "Admin"
  openai_base_url: "https://api.openai.com/v1"
  openai_api_key_env: "OPENAI_API_KEY"
  default_model: "gpt-4o-mini"

# Durable platform domain events (controlplane → platform_event_outbox → worker → broker).
# Enable outbox_enabled and set publisher to log|nats|kafka|noop.
events:
  outbox_enabled: false
  publisher: log
  nats:
    url: "nats://127.0.0.1:4222"
    stream: AFI_PLATFORM
    subject_prefix: afi.platform
  kafka:
    brokers: "127.0.0.1:9092"
    topic: afi.platform.events

# Outbound mail for org member invites.
# default_provider: log | smtp | resend (log = print to controlplane logs).
# Point smtp at Mailpit/Mailhog for local delivery (e.g. localhost:1025).
mail:
  public_app_url: "http://localhost:3000"
  from: "AFI <noreply@afi.local>"
  default_provider: log
  smtp:
    enabled: false
    host: localhost
    port: 1025
    username: ""
    password: ""
    tls: false
  resend:
    enabled: false
    api_key: ""

