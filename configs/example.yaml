organizations:
  - id: "org_example"
    name: "Example Organization"

teams:
  - id: "team_example"
    org_id: "org_example"
    name: "Example Team"

projects:
  - id: "proj_example"
    team_id: "team_example"
    name: "Example Project"
  
hooks:
  timeout_ms: 50
  specs:
    - name: onRequest
      path: hooks/example.js

providers:
  openai:
    base_url: https://api.openai.com
    api_key: ${OPENAI_API_KEY}
  anthropic:
    base_url: https://api.anthropic.com
    api_key: ${ANTHROPIC_API_KEY}

http:
  port: 8080
  read_timeout: 15s
  write_timeout: 0s

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  name: afi_gateway
  ssl_mode: disable
  connection_string: postgresql://postgres:postgres@localhost:5432/afi_gateway?sslmode=disable

auth:
  token_secret: "super-secure-dev-platform-secret-key-change-in-prod"
  token_duration: 12h
  issuer: "afi-gateway-platform"

api_keys:
  - raw_key_prefix: "sk-project-local-dev-token-12345" # Becomes sk-project-local-dev-token-12345...
    type: "SERVICE_ACCOUNT"
    project_id: "proj_local"

upstream_credentials:
  - project_id: "proj_local"
    provider: "openai"
    env_var_key: "LOCAL_OPENAI_API_KEY" # Reads from your local shell environment
  - project_id: "proj_local"
    provider: "anthropic"
    env_var_key: "LOCAL_ANTHROPIC_API_KEY"

# Hierarchical Budgets Checkpoints Setup
budgets:
  - scope: "PROJECT"
    target_id: "proj_example"
    max_cost: 50.00
    used_cost: 0.00

routing_rules:
  - id: "rule_1"
    name: "Catch-all Local Dev Rule"
    priority: 1
    is_active: true
    conditions: [] # Ensure this array is explicitly empty to match EVERYTHING
    target:
      provider: "openai"
      target_model: "gpt-4o"
