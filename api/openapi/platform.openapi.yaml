openapi: 3.1.0
info:
  title: AFI Platform API
  description: 'Control plane admin API (`/api/v1/platform`).


    Auth: JWT Bearer from login / invite accept / SSO.

    Errors: JSON `{"error":"..."}`.

    RBAC is enforced server-side (org member/admin/owner, team roles); see operation descriptions.

    '
  version: 1.0.0
servers:
- url: http://localhost:8081
  description: Local control plane
security:
- bearerAuth: []
tags:
- name: Health
- name: Auth
- name: Organizations
- name: Teams
- name: Projects
- name: Keys
- name: Providers
- name: Routes
- name: Quotas
- name: Policies
- name: WasmHooks
- name: MCP
- name: A2A
- name: Credentials
- name: Usage
- name: Audit
paths:
  /healthz:
    get:
      operationId: platformHealthz
      summary: Control plane liveness
      tags:
      - Health
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security: []
  /api/v1/platform/auth/login:
    post:
      operationId: login
      summary: Password login
      tags:
      - Auth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
  /api/v1/platform/auth/me:
    get:
      operationId: me
      summary: Current user
      tags:
      - Auth
      responses:
        '200':
