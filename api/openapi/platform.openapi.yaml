      security: []
  /api/v1/platform/auth/sso/{provider}/start:
    get:
      operationId: ssoStart
      summary: Start SSO
      tags:
      - Auth
      responses:
        '302':
          description: Redirect to IdP
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security: []
      parameters:
      - &id001
        name: provider
        in: path
        required: true
        schema:
          type: string
      - name: redirect
        in: query
        schema:
          type: string
  /api/v1/platform/auth/sso/{provider}/callback:
    get:
      operationId: ssoCallback
      summary: SSO OAuth/OIDC callback
      tags:
      - Auth
      responses:
        '302':
          description: Redirect to web UI
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security: []
      parameters: &id002
      - *id001
    post:
      operationId: ssoACS
      summary: SAML ACS callback
      tags:
      - Auth
      responses:
        '302':
          description: Redirect to web UI
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security: []
      parameters: *id002
  /api/v1/platform/auth/sso/{provider}/metadata:
