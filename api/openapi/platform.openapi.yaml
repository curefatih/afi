components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Platform session JWT from POST /auth/login or invite accept.
  schemas:
    Error:
      type: object
      required:
      - error
      properties:
        error:
          type: string
    Organization:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
        name:
          type: string
        mail_provider:
          type: string
        byok_selector_header:
          type: string
        created_at:
          type: string
          format: date-time
    OrgMember:
      type: object
      required:
      - user_id
      - email
      - name
      - role
      properties:
        user_id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
          - owner
          - admin
          - member
    OrgInvite:
      type: object
      required:
      - id
      - organization_id
      - email
      - role
      - invited_by_user_id
      - status
      - expires_at
      - created_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        email:
          type: string
        role:
          type: string
        invited_by_user_id:
          type: string
        status:
          type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        accepted_at:
          type:
          - string
          - 'null'
          format: date-time
    InviteOutcome:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - added
          - invited
        member:
          $ref: '#/components/schemas/OrgMember'
        invite:
          $ref: '#/components/schemas/OrgInvite'
    OrgMailSettings:
      type: object
      required:
      - selected
      - default_provider
      - enabled_providers
      properties:
        selected:
          type: string
        default_provider:
          type: string
        enabled_providers:
          type: array
          items:
            type: string
        from:
          type: string
        public_app_url:
          type: string
    BackoffConfig:
      type: object
      required:
      - strategy
      - base_delay
      properties:
        strategy:
          type: string
          enum:
          - fixed
          - exponential
        base_delay:
          type: string
        max_delay:
          type: string
        multiplier:
          type: number
    RetryConfig:
      type: object
      required:
      - max_attempts
      - backoff
      properties:
        max_attempts:
          type: integer
          minimum: 1
        backoff:
          $ref: '#/components/schemas/BackoffConfig'
    OrgDefaultRetrySettings:
      type: object
      properties:
        retry:
          oneOf:
          - $ref: '#/components/schemas/RetryConfig'
          - type: 'null'
    InvitePreview:
      type: object
      required:
      - email
      - organization_id
      - organization_name
      - expires_at
      - user_exists
      properties:
        email:
          type: string
        organization_id:
          type: string
        organization_name:
          type: string
        expires_at:
          type: string
          format: date-time
        user_exists:
          type: boolean
    MeResponse:
      type: object
      required:
      - id
      - name
      - email
      - role
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    LoginResponse:
